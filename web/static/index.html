<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Tracker</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>

  <div class="auth-page" id="auth-page">
    <!-- Default: signed-out login card. JS swaps this for a status card
         if the visitor turns out to be signed in but pending/blocked. -->
    <div class="auth-card" id="login-card">
      <h1>DSA Tracker</h1>
      <p class="subtitle">Track your pattern-recognition checklist, college-tagged, with friends.</p>

      <div class="form-error" id="form-error"></div>

      <a class="google-btn" id="google-signin-btn" href="#">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.12-.84 2.07-1.8 2.71v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.61z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33C2.44 15.98 5.48 18 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.71c-.18-.54-.28-1.11-.28-1.71s.1-1.17.28-1.71V4.96H.96A8.996 8.996 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </a>

      <p class="auth-tagline">
        Sign-in uses your college Google account.<br />
        Non-college domains are blocked by default — see the README if you're a developer.
      </p>
    </div>

    <!-- Status card: shown instead of login-card when the visitor has a
         valid session but isn't fully active (pending review / blocked). -->
    <div class="status-card" id="status-card" style="display: none;">
      <span class="status-badge" id="status-badge">Status</span>
      <h1 id="status-title">—</h1>
      <p id="status-body">—</p>

      <!-- Only shown for pending_review accounts that haven't named their
           college yet — lets the first user from a new domain name it. -->
      <div id="college-name-form" style="display: none; text-align: left; margin-top: 18px;">
        <div class="field">
          <label for="college-name-input">Your college's name</label>
          <input type="text" id="college-name-input" placeholder="e.g. KIIT University" />
        </div>
        <div class="form-error" id="college-name-error"></div>
        <button class="btn btn-primary" id="college-name-submit" style="width: 100%;">Submit for review</button>
      </div>

      <button class="btn btn-ghost" id="status-logout-btn">Sign out</button>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/index.js"></script>
</body>
</html>
